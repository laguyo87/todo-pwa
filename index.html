<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#4f7cff" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="할일" />
  <title>할일</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <button class="update-pill" id="updateBtn" type="button" hidden>
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12a9 9 0 1 1-2.64-6.36M21 3v6h-6"/></svg>
    <span class="update-label">새 버전 업데이트</span>
  </button>

  <header class="app-header">
    <div class="header-text">
      <h1 class="app-title">할일</h1>
      <p class="app-count" id="count">남은 할일 0개</p>
    </div>
    <div class="header-actions">
      <button class="icon-btn" id="exportBtn" type="button" aria-label="백업 내보내기">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M8 11l4 4 4-4M5 21h14"/></svg>
      </button>
      <button class="icon-btn" id="importBtn" type="button" aria-label="백업 가져오기">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 15V3M8 7l4-4 4 4M5 21h14"/></svg>
      </button>
    </div>
  </header>

  <main class="app-main">
    <ul class="todo-list" id="list"></ul>
    <div class="empty-state" id="empty" hidden>
      <div class="empty-emoji">📝</div>
      <p>할일이 없어요</p>
      <span>아래에서 새 할일을 추가해 보세요</span>
    </div>

    <footer class="app-version" id="version">버전 확인 중…</footer>
  </main>

  <div class="sheet-backdrop" id="sheet" hidden>
    <div class="sheet" role="dialog" aria-modal="true" aria-labelledby="sheetTitle">
      <div class="sheet-grip"></div>
      <h2 class="sheet-title" id="sheetTitle"></h2>
      <p class="sheet-hint" id="sheetHint"></p>
      <textarea class="sheet-text" id="sheetText" spellcheck="false" autocapitalize="off" autocomplete="off"></textarea>
      <p class="sheet-status" id="sheetStatus" aria-live="polite"></p>
      <div class="sheet-actions" id="sheetActions"></div>
    </div>
  </div>

  <input type="file" id="fileInput" accept="application/json,.json" hidden />

  <form class="composer" id="form" autocomplete="off">
    <input
      class="composer-input"
      id="input"
      type="text"
      inputmode="text"
      enterkeyhint="done"
      placeholder="할일을 입력하세요"
      aria-label="할일 입력"
      maxlength="200"
    />
    <button class="composer-add" id="add" type="submit" aria-label="추가">
      <svg viewBox="0 0 24 24" width="26" height="26" aria-hidden="true">
        <path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/>
      </svg>
    </button>
  </form>

  <script src="app.js"></script>
</body>
</html>
